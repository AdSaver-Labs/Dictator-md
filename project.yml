name: Dictator-md
options:
  bundleIdPrefix: com.dictatormd
  deploymentTarget:
    macOS: "14.0"
    iOS: "17.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5"
    MACOSX_DEPLOYMENT_TARGET: "14.0"

targets:
  DictatorMD:
    type: application
    platform: macOS
    sources:
      - path: DictatorMD
        excludes:
          - "**/*.entitlements"
          - "Info.plist"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.dictatormd.DictatorMD
        INFOPLIST_FILE: DictatorMD/Info.plist
        CODE_SIGN_ENTITLEMENTS: DictatorMD/DictatorMD.entitlements
        SWIFT_OBJC_BRIDGING_HEADER: DictatorMD/DictatorMD-Bridging-Header.h
        HEADER_SEARCH_PATHS:
          - "$(PROJECT_DIR)/lib"
        LIBRARY_SEARCH_PATHS:
          - "$(PROJECT_DIR)/lib"
        OTHER_LDFLAGS:
          - "-lwhisper"
          - "-lggml"
          - "-lggml-base"
          - "-lggml-cpu"
          - "-lggml-metal"
          - "-lggml-blas"
          - "-lc++"
        CODE_SIGN_IDENTITY: "-"
        ENABLE_HARDENED_RUNTIME: false
      configs:
        Debug:
          SWIFT_OPTIMIZATION_LEVEL: "-Onone"
        Release:
          SWIFT_OPTIMIZATION_LEVEL: "-O"
    dependencies:
      - sdk: Accelerate.framework
      - sdk: Metal.framework
      - sdk: MetalKit.framework
      - sdk: AVFoundation.framework
      - sdk: CoreGraphics.framework
      - sdk: AppKit.framework
      - sdk: CoreAudio.framework
      - sdk: ServiceManagement.framework
    info:
      path: DictatorMD/Info.plist
      properties:
        LSUIElement: false
        NSMicrophoneUsageDescription: "Dictator-md needs microphone access to capture your voice for speech-to-text transcription."
        NSPrincipalClass: NSApplication
        CFBundleIconFile: AppIcon
    entitlements:
      path: DictatorMD/DictatorMD.entitlements
      properties:
        com.apple.security.device.audio-input: true

  DictatorMDTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: DictatorMDTests
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.dictatormd.DictatorMDTests
        GENERATE_INFOPLIST_FILE: YES
    dependencies:
      - target: DictatorMD

  DictatorMDiOS:
    type: application
    platform: iOS
    sources:
      - path: apps/ios/DictatorMDiOS
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.dictatormd.DictatorMDiOS
        INFOPLIST_FILE: apps/ios/DictatorMDiOS/Info.plist
        CODE_SIGN_ENTITLEMENTS: apps/ios/DictatorMDiOS/DictatorMDiOS.entitlements
        SWIFT_VERSION: "5"
    dependencies:
      - target: DictatorMDKeyboard

  DictatorMDKeyboard:
    type: app-extension
    platform: iOS
    sources:
      - path: apps/ios/DictatorMDKeyboard
      - path: apps/ios/DictatorMDiOS/Shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.dictatormd.DictatorMDiOS.Keyboard
        INFOPLIST_FILE: apps/ios/DictatorMDKeyboard/Info.plist
        CODE_SIGN_ENTITLEMENTS: apps/ios/DictatorMDKeyboard/DictatorMDKeyboard.entitlements
        SWIFT_VERSION: "5"
