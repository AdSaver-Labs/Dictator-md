name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  macos:
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Cache whisper.cpp build
        uses: actions/cache@v4
        with:
          path: lib/
          key: whisper-cpp-${{ hashFiles('.gitmodules', 'whisper.cpp/CMakeLists.txt') }}-macos

      - name: Build whisper.cpp
        run: |
          if [ ! -f lib/libwhisper.a ]; then
            ./scripts/build-whisper.sh
          fi

      - name: Build app
        run: make app ALLOW_ADHOC=1

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Dictator-md.app
          path: build/Dictator-md.app

  windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup MSVC developer environment
        uses: ilammy/msvc-dev-cmd@v1

      - name: Configure Windows prototype
        run: cmake -S apps/windows -B build/windows -G Ninja -DCMAKE_BUILD_TYPE=Release

      - name: Build Windows prototype
        run: cmake --build build/windows

      - name: Verify Windows runtime dependencies
        shell: pwsh
        run: |
          $deps = & dumpbin /dependents build/windows/Dictator-md.exe
          $deps | Out-String | Write-Host
          if ($deps -match "VCRUNTIME|MSVCP") {
            throw "Windows executable depends on Visual C++ runtime DLLs. The preview should launch on tester machines without extra runtime installs."
          }

      - name: Smoke test Windows executable launches
        shell: pwsh
        run: |
          $process = Start-Process -FilePath build/windows/Dictator-md.exe -PassThru
          for ($attempt = 0; $attempt -lt 10; $attempt++) {
            Start-Sleep -Milliseconds 500
            $process.Refresh()
            if ($process.HasExited -or $process.MainWindowHandle -ne 0) {
              break
            }
          }
          if ($process.HasExited) {
            throw "Dictator-md.exe exited during launch smoke test with code $($process.ExitCode)."
          }
          if ($process.MainWindowHandle -eq 0) {
            Stop-Process -Id $process.Id -Force
            throw "Dictator-md.exe launched but did not create a visible main window."
          }
          Stop-Process -Id $process.Id -Force

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: Dictator-md-windows-prototype
          path: build/windows/Dictator-md.exe
