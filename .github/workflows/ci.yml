name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  macos:
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Cache whisper.cpp build
        uses: actions/cache@v4
        with:
          path: lib/
          key: whisper-cpp-${{ hashFiles('.gitmodules', 'whisper.cpp/CMakeLists.txt') }}-macos

      - name: Build whisper.cpp
        run: |
          if [ ! -f lib/libwhisper.a ]; then
            ./scripts/build-whisper.sh
          fi

      - name: Build app
        run: make app ALLOW_ADHOC=1

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Dictator-md.app
          path: build/Dictator-md.app

  windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Configure Windows prototype
        run: cmake -S apps/windows -B build/windows -G "Visual Studio 17 2022" -A x64

      - name: Build Windows prototype
        run: cmake --build build/windows --config Release

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: Dictator-md-windows-prototype
          path: build/windows/Release/Dictator-md.exe
