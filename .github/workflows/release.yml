name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-and-release:
    runs-on: macos-15
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Build whisper.cpp
        run: ./scripts/build-whisper.sh

      - name: Build app
        run: make app ALLOW_ADHOC=1

      - name: Create DMG
        run: |
          chmod +x ./scripts/create-dmg.sh
          ./scripts/create-dmg.sh

      - name: Generate SHA256 checksum
        id: checksum
        run: |
          cd build
          shasum -a 256 Dictator-md.dmg > Dictator-md.dmg.sha256
          SHA=$(shasum -a 256 Dictator-md.dmg | awk '{print $1}')
          echo "sha=$SHA" >> "$GITHUB_OUTPUT"
          cat Dictator-md.dmg.sha256

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        env:
          SHA256: ${{ steps.checksum.outputs.sha }}
        with:
          files: |
            build/Dictator-md.dmg
            build/Dictator-md.dmg.sha256
          generate_release_notes: true
          append_body: true
          body: |

            ### Verify download integrity
            ```
            shasum -a 256 Dictator-md.dmg
            ```
            Expected SHA256: see `Dictator-md.dmg.sha256` attached to this release.
